{{ define "title" }}{{ .Site.Title }}{{ end }}
{{ define "main" }}
{{ .Content }}
<nav class="sections-grid">
  <a href="{{ "research/" | relURL }}" class="section-card">
    <div class="section-thumb research-thumb"></div>
    <span class="section-label">Research</span>
  </a>
  <a href="{{ "projects/" | relURL }}" class="section-card">
    <div class="section-thumb projects-thumb"></div>
    <span class="section-label">Projects</span>
  </a>
  <a href="{{ "personal/" | relURL }}" class="section-card">
    <div class="section-thumb personal-thumb"></div>
    <span class="section-label">Personal</span>
  </a>
</nav>
{{ with .Site.GetPage "section" "research" }}
  {{ range .Pages }}{{ .Content }}{{ end }}
{{ end }}
{{ end }}
